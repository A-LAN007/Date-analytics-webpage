<script>
let currentTimeRange = 'week';
let currentPage = 'overview';
let trendChart, barChart, pieChart;
let currentDashboardData = null;

// 生成随机数（min~max，可保留小数位数）
const rand = (min, max, decimals = 0) => {
let val = min + Math.random() * (max - min);
return decimals === 0 ? Math.round(val) : parseFloat(val.toFixed(decimals));
};

// 根据时间范围获取数据缩放系数
function getScaleFactor() {
switch(currentTimeRange) {
case 'day': return { gmv: 0.14, order: 0.16, user: 0.17, exposure: 0.18 };
case 'week': return { gmv: 1.0, order: 1.0, user: 1.0, exposure: 1.0 };
case 'month': return { gmv: 4.3, order: 4.4, user: 4.6, exposure: 4.2 };
case 'yoy': return { gmv: 1.0, order: 1.0, user: 1.0, exposure: 1.0 };
default: return { gmv: 1.0, order: 1.0, user: 1.0, exposure: 1.0 };
}
}

/**
 * 计算移动平均线（MA3和MA5）
 * 用于趋势平滑，识别短期和中期走势
 * @param {Array<number>} data - 原始数据序列
 * @returns {Object} { ma3, ma5 } 移动平均数组，不足位置为null
 */
function calculateMovingAverages(data) {
const ma3 = [], ma5 = [];
for (let i = 0; i < data.length; i++) {
if (i >= 2) {
let sum3 = data[i-2] + data[i-1] + data[i];
ma3.push(sum3 / 3);
} else { ma3.push(null); }
if (i >= 4) {
let sum5 = data[i-4] + data[i-3] + data[i-2] + data[i-1] + data[i];
ma5.push(sum5 / 5);
} else { ma5.push(null); }
}
return { ma3, ma5 };
}

// 生成全部随机模拟数据（基于当前时间范围）
function generateRandomData() {
const scale = getScaleFactor();
let baseGmv = rand(120, 210, 1);
let baseOrders = rand(35, 55, 0);
let baseUsers = rand(22, 35, 0);
let baseExposure = rand(800, 1600, 0);
let gmvActual = baseGmv * scale.gmv;
let orders = baseOrders * scale.order;
let users = baseUsers * scale.user;
let exposure = baseExposure * scale.exposure;
if (currentTimeRange === 'day') {
gmvActual = Math.min(gmvActual, baseGmv * 0.2);
orders = Math.min(orders, baseOrders * 0.22);
users = Math.min(users, baseUsers * 0.23);
exposure = Math.min(exposure, baseExposure * 0.25);
}
const gmvTarget = gmvActual * rand(0.88, 1.12, 2);
const completionRate = (gmvActual / gmvTarget) * 100;
let yoyGmv, momGmv;
if (currentTimeRange === 'yoy') {
const lastYearGmv = gmvActual / rand(1.05, 1.18, 2);
yoyGmv = ((gmvActual - lastYearGmv) / lastYearGmv) * 100;
momGmv = rand(-4, 10, 1);
} else {
yoyGmv = rand(-3, 22, 1);
momGmv = rand(-4, 11, 1);
}
const conversion = rand(2.6, 5.5, 2);
const profit = gmvActual * rand(0.22, 0.31, 2);
const cost = gmvActual - profit;
const onlinePct = rand(56, 76, 1);
const offlinePct = 100 - onlinePct;
const appPct = rand(30, 48, 1);
const miniPct = rand(18, 38, 1);
const douyinOrders = rand(6, 14);
const eastPct = rand(32, 46, 1);
const southPct = rand(22, 34, 1);
const northPct = rand(12, 21, 1);
const otherPct = 100 - eastPct - southPct - northPct;
const newUserPct = rand(25, 44, 1);
const oldUserPct = 100 - newUserPct;
const memberContribution = rand(58, 76, 1);
const repurchase = rand(36, 54, 1);
const premiumPct = rand(28, 46, 1);
const midPct = rand(34, 52, 1);
const basicPct = 100 - premiumPct - midPct;
let clicks = exposure * rand(0.065, 0.12, 2);
let visits = clicks * rand(0.68, 0.84, 2);
const ctr = (clicks / exposure) * 100;
const addToCartRate = rand(12, 23, 1);
const orderRate = rand(6, 12.5, 1);
const avgProcessHours = rand(1.2, 3.3, 1);
const responseRate = rand(94, 99.2, 1);
const cac = rand(38, 66, 0);
const lossRate = rand(1.2, 3.6, 1);
const southDrop = rand(-21, -6, 1);
const eastGrowth = rand(2, 15, 1);
const cacAlert = cac > 54;
const abnormalOrders = rand(3, 11, 0);
const conversionDrop = rand(-8, -2, 1);
let dailyAvg = gmvActual / (currentTimeRange === 'day' ? 1 : (currentTimeRange === 'week' ? 7 : (currentTimeRange === 'month' ? 30 : 7)));
dailyAvg = Math.max(dailyAvg, 3);
let trendData = [];
for (let i = 0; i < 7; i++) trendData.push(rand(dailyAvg * 0.75, dailyAvg * 1.35, 0));
const { ma3, ma5 } = calculateMovingAverages(trendData);
const channelOrders = [ rand(orders * 0.22, orders * 0.36, 0), rand(orders * 0.16, orders * 0.28, 0), rand(orders * 0.18, orders * 0.31, 0), rand(orders * 0.1, orders * 0.21, 0), rand(orders * 0.04, orders * 0.11, 0) ];
const visitFunnel = Math.round(visits);
const cartFunnel = Math.round(visits * addToCartRate / 100);
const orderFunnel = Math.round(visits * orderRate / 100);
const payFunnel = Math.round(orderFunnel * rand(86, 97, 1) / 100);
const tasks = {
pending: [ { name: '华南大区销量挽回计划', priority: '高', deadline: '2026-04-25', owner: '陈敏', status: '待启动' }, { name: 'CAC成本优化专项', priority: '高', deadline: '2026-04-30', owner: '王晨', status: '待启动' }, { name: '618预热流量方案制定', priority: '中', deadline: '2026-05-10', owner: '李彤', status: '待启动' } ],
inProgress: [ { name: '漏斗转化率优化', priority: '高', progress: '65%', owner: '产品运营部', deadline: '2026-04-28' }, { name: '会员体系升级', priority: '中', progress: '40%', owner: '会员运营部', deadline: '2026-05-15' } ],

// 为可点击元素绑定详情弹窗
function bindClickables() {
document.querySelectorAll('.clickable-card, .funnel-step, .task-item, .dimension-item, .process-item, .kpi-card, .alert-card-item, .detail-item').forEach(el => {
if (!el.hasAttribute('data-bound')) {
el.classList.add('clickable');
el.setAttribute('data-bound', 'true');
el.addEventListener('click', (e) => {
e.stopPropagation();
const title = el.querySelector('.metric-label')?.innerText || el.innerText.slice(0, 40);
showDetail(`<strong>📌 ${title || '数据详情'}</strong><br><br>模拟详细分析面板。<br>实际业务中可跳转对应报表。<br><br>🔍 当前数值：${el.innerText.slice(0, 100)}`);
});
}
});

// 统一渲染所有页面

// 导出当前数据为CSV
function exportToCSV() { if (!currentDashboardData) return; const d = currentDashboardData; const rows = [['指标','数值'],['GMV实际(百万)',d.gmvActual],['GMV目标(百万)',d.gmvTarget],['完成率(%)',d.completionRate.toFixed(1)],['订单量(K)',d.orders],['用户数(K)',d.users],['转化率(%)',d.conversion],['获客成本(元)',d.cac],['线上占比(%)',d.onlinePct],['华东区域占比(%)',d.eastPct],['华南区域占比(%)',d.southPct],['同比增速(%)',d.yoyGmv.toFixed(1)]]; let csv = rows.map(row=>row.join(',')).join('\n'); const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' }); const link = document.createElement('a'); const url = URL.createObjectURL(blob); link.href = url; link.setAttribute('download', `看板数据_${currentTimeRange}.csv`); document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url); showDetail('✅ 导出成功！文件已保存至下载目录。'); }

// 刷新全部数据
function refreshData() { const newData = generateRandomData(); currentDashboardData = newData; renderAllPages(newData); const rangeText = { day:'今日 (实时)', week:'本周 (04.13-04.19)', month:'本月 (04.01-04.30)', yoy:'累计同比 vs 去年' }; document.getElementById('dateRangeLabel').innerHTML = rangeText[currentTimeRange] || currentTimeRange; }

// 切换时间范围
function changeTimeRange(range) { currentTimeRange = range; refreshData(); document.querySelectorAll('.time-filter-btn').forEach(btn => { if (btn.getAttribute('data-range') === range) btn.classList.add('active'); else btn.classList.remove('active'); }); }

// 切换页面
function switchPage(pageId) { currentPage = pageId; document.querySelectorAll('.page').forEach(page => page.classList.remove('active-page')); document.getElementById(`page-${pageId}`).classList.add('active-page'); document.querySelectorAll('.nav-item').forEach(item => { if (item.getAttribute('data-page') === pageId) item.classList.add('active'); else item.classList.remove('active'); }); }

// 初始化
function init() { refreshData(); document.querySelectorAll('.time-filter-btn').forEach(btn => { btn.addEventListener('click', () => changeTimeRange(btn.getAttribute('data-range'))); }); document.getElementById('refreshDataBtn').addEventListener('click', () => refreshData()); document.getElementById('exportBtn').addEventListener('click', exportToCSV); document.querySelectorAll('.nav-item').forEach(item => { item.addEventListener('click', () => switchPage(item.getAttribute('data-page'))); }); }
window.addEventListener('load', init);
</script>

<!-- 增强模块：实时模式、阈值配置、预测线、风险卡片等 -->
<script>
(function enhanceDashboard() {
  setTimeout(() => {
    // ----- 1. 注入实时模式开关和阈值配置按钮 -----
    const navActions = document.getElementById('navActions');
    if (navActions && !document.getElementById('enhanceRealtimeSwitch')) {
      const realtimeHtml = `<div class="realtime-switch-container" style="display:flex; align-items:center; gap:10px; margin-left:5px;">
        <i class="fas fa-sync-alt" style="font-size:12px;"></i>
        <label style="display:flex; align-items:center; gap:6px; font-size:0.75rem;">实时模式
          <div class="switch"><input type="checkbox" id="realtimeToggle"><span class="slider"></span></div>
        </label>
        <button id="thresholdConfigBtn" class="threshold-btn"><i class="fas fa-sliders-h"></i> 阈值</button>
      </div>`;
      navActions.insertAdjacentHTML('beforeend', realtimeHtml);
    }

    // 全局增强变量
    let realtimeEnabled = false;
    let realtimeInterval = null;
    let customThresholds = { southDrop: -10, cacMax: 55, conversionMin: 4.0 };

    /**
     * 实时模式下对当前数据做微小扰动，模拟真实波动
     * 主要调整 GMV 及关联指标，保持趋势连续性
     */
    function microAdjustCurrentData() {
      if (!currentDashboardData) return;
      const d = currentDashboardData;
      const oldGmv = d.gmvActual;
      const delta = (Math.random() - 0.5) * 0.012 * oldGmv;
      let newGmv = oldGmv + delta;
      newGmv = Math.max(newGmv, oldGmv * 0.96);
      newGmv = Math.min(newGmv, oldGmv * 1.04);
      const factor = newGmv / oldGmv;
      d.gmvActual = newGmv;
      d.gmvTarget = d.gmvTarget * factor;
      d.completionRate = (d.gmvActual / d.gmvTarget) * 100;
      d.orders = Math.round(d.orders * factor);
      d.users = Math.round(d.users * factor);
      d.profit = d.gmvActual * rand(0.22, 0.31, 2);
      d.cost = d.gmvActual - d.profit;
      d.trendData[6] = d.gmvActual / (currentTimeRange === 'day' ? 1 : (currentTimeRange === 'week' ? 7 : 30)) * (currentTimeRange==='yoy'?1:1);
      if (d.trendData[6] < 0.1) d.trendData[6] = d.gmvActual * 0.12;
      const { ma3, ma5 } = calculateMovingAverages(d.trendData);
      d.ma3 = ma3; d.ma5 = ma5;
      renderAllPages(d);
      addForecastLineToChart();
    }

    function startRealtime() { if (realtimeInterval) clearInterval(realtimeInterval); realtimeInterval = setInterval(() => { if (realtimeEnabled && currentDashboardData) microAdjustCurrentData(); }, 2800); }
    function stopRealtime() { if (realtimeInterval) { clearInterval(realtimeInterval); realtimeInterval = null; } }

    // ----- 2. 向趋势图中添加线性回归预测线（未来3天）-----
    // 基于已有 trendData 使用最小二乘法计算斜率和截距，外推3个点
    function addForecastLineToChart() {
      if (!trendChart || !currentDashboardData) return;
      const data = currentDashboardData.trendData;
      if (!data || data.length < 3) return;
      const n = data.length;
      let sumX=0, sumY=0, sumXY=0, sumX2=0;
      for(let i=0;i<n;i++) { sumX+=i; sumY+=data[i]; sumXY+=i*data[i]; sumX2+=i*i; }
      const slope = (n*sumXY - sumX*sumY) / (n*sumX2 - sumX*sumX);
      const intercept = (sumY - slope*sumX)/n;
      const forecastDays = 3;
      let forecastVals = [];
      for(let i=1;i<=forecastDays;i++) { let pred = intercept + slope*(n+i-1); forecastVals.push(parseFloat(pred.toFixed(1))); }
      const existingForecast = trendChart.data.datasets.find(ds => ds.label === '线性预测 (未来3天)');
      if(existingForecast) {
        existingForecast.data = [...Array(7).fill(null), ...forecastVals];
        trendChart.update();
      } else {
        trendChart.data.datasets.push({
          label: '线性预测 (未来3天)',
          data: [...Array(7).fill(null), ...forecastVals],
          borderColor: '#ffb347',
          borderWidth: 2,
          borderDash: [6, 8],
          fill: false,
          pointRadius: 0,
          tension: 0.1
        });
        trendChart.update();
      }
    }

    // 劫持刷新和渲染函数，确保预测线每次更新后重新添加
    const originalRefresh = window.refreshData;
    window.refreshData = function() { originalRefresh(); setTimeout(() => addForecastLineToChart(), 100); };
    const originalRenderOverview = window.renderOverview;
    if(originalRenderOverview) {
      window.renderOverview = function(d) { originalRenderOverview(d); setTimeout(() => addForecastLineToChart(), 150); };
    }

    // ----- 3. 阈值配置与动态预警样式应用 -----
    function applyThresholdsToAlerts() {
      if (!currentDashboardData) return;
      const d = currentDashboardData;
      const southAlert = d.southDrop < customThresholds.southDrop;
      const cacAlert = d.cac > customThresholds.cacMax;
      const convAlert = d.conversion < customThresholds.conversionMin;
      const alertContainer = document.getElementById('alertOverviewContainer');
      if(alertContainer) {
        const items = alertContainer.querySelectorAll('.alert-card-item');
        if(items[0]) items[0].style.borderLeftColor = southAlert ? '#ff5c5c' : '#ffaa33';
        if(items[1]) items[1].style.borderLeftColor = cacAlert ? '#ff5c5c' : '#2bd67b';
      }
      const thresContainer = document.getElementById('alertThresholdContainer');
      if(thresContainer) {
        const thresItems = thresContainer.querySelectorAll('.alert-card-item');
        if(thresItems[0]) thresItems[0].style.borderLeftColor = southAlert ? '#ff5c5c' : '#ffaa33';
        if(thresItems[1]) thresItems[1].style.borderLeftColor = cacAlert ? '#ff5c5c' : '#ffaa33';
      }
    }

    function configThreshold() {
      let newSouth = prompt(`华南区环比阈值 (低于此值告警, 当前${customThresholds.southDrop}%)`, customThresholds.southDrop);
      if(newSouth !== null && !isNaN(parseFloat(newSouth))) customThresholds.southDrop = parseFloat(newSouth);
      let newCac = prompt(`CAC上限 (元, 当前${customThresholds.cacMax})`, customThresholds.cacMax);
      if(newCac !== null && !isNaN(parseFloat(newCac))) customThresholds.cacMax = parseFloat(newCac);
      let newConv = prompt(`转化率目标下限 (%, 当前${customThresholds.conversionMin}%)`, customThresholds.conversionMin);
      if(newConv !== null && !isNaN(parseFloat(newConv))) customThresholds.conversionMin = parseFloat(newConv);
      applyThresholdsToAlerts();
      showDetail(`阈值已更新：华南区阈值 ${customThresholds.southDrop}%，CAC上限 ¥${customThresholds.cacMax}，转化率目标 ${customThresholds.conversionMin}%`);
    }

    // ----- 4. 增加综合风险指数卡片（位于KPI区域末尾）-----
    const kpiGrid = document.getElementById('kpiContainer');
    if(kpiGrid && !document.getElementById('riskExtraCard')) {
      const riskCard = document.createElement('div');
      riskCard.id = 'riskExtraCard';
      riskCard.className = 'card risk-card-ext clickable';
      riskCard.innerHTML = `<div class="metric-label"><i class="fas fa-shield-alt"></i> 综合风险指数</div>
        <div class="kpi-value" id="riskScoreVal">--</div>
        <div>华南区风险 <span id="southRiskSpan" class="trend-down"></span> &nbsp; CAC <span id="cacRiskSpan"></span></div>
        <div class="progress-bar mt-2"><div id="riskBarFill" class="progress-fill" style="width:0%"></div></div>`;
      kpiGrid.appendChild(riskCard);
      function updateRiskCard() {
        if(!currentDashboardData) return;
        const d = currentDashboardData;
        let riskScore = 0;
        if(d.southDrop < customThresholds.southDrop) riskScore += 40;
        else if(d.southDrop < -5) riskScore += 20;
        if(d.cac > customThresholds.cacMax) riskScore += 35;
        else if(d.cac > 50) riskScore += 15;
        if(d.conversion < customThresholds.conversionMin) riskScore += 25;
        riskScore = Math.min(100, riskScore);
        document.getElementById('riskScoreVal').innerText = riskScore;
        document.getElementById('riskBarFill').style.width = `${riskScore}%`;
        document.getElementById('southRiskSpan').innerHTML = `${d.southDrop}%`;
        document.getElementById('cacRiskSpan').innerHTML = `¥${d.cac}`;
        if(riskScore > 60) riskCard.style.borderLeftColor = '#ff5c5c';
        else if(riskScore > 30) riskCard.style.borderLeftColor = '#ffb347';
        else riskCard.style.borderLeftColor = '#2bd67b';
      }
      setInterval(updateRiskCard, 1000);
      updateRiskCard();
    }

    // ----- 5. 预测复盘页面增加线性回归预测详情模块 -----
    function enhanceReviewForecast() {
      const reviewForecastDiv = document.getElementById('reviewForecastContainer');
      if(reviewForecastDiv && !document.getElementById('linearForecastExtra')) {
        const extraDiv = document.createElement('div');
        extraDiv.id = 'linearForecastExtra';
        extraDiv.className = 'clickable-card mt-3';
        extraDiv.style.marginTop = '16px';
        extraDiv.style.padding = '12px';
        extraDiv.style.background = '#1e212e';
        extraDiv.style.borderRadius = '16px';
        reviewForecastDiv.appendChild(extraDiv);
        function updateLinearForecast() {
          if(!currentDashboardData) return;
          const trend = currentDashboardData.trendData;
          if(trend && trend.length>=3) {
            const n = trend.length;
            let sumX=0,sumY=0,sumXY=0,sumX2=0;
            for(let i=0;i<n;i++) { sumX+=i; sumY+=trend[i]; sumXY+=i*trend[i]; sumX2+=i*i; }
            const slope = (n*sumXY - sumX*sumY) / (n*sumX2 - sumX*sumX);
            const intercept = (sumY - slope*sumX)/n;
            let preds = [];
            for(let i=1;i<=3;i++) preds.push((intercept + slope*(n+i-1)).toFixed(1));
            extraDiv.innerHTML = `<strong>📈 线性回归预测 (未来3日GMV)</strong><br> 📅 +1日: ${preds[0]} 万元 &nbsp; +2日: ${preds[1]} 万元 &nbsp; +3日: ${preds[2]} 万元<br><span class="tag">基于近7日趋势建模</span>`;
          } else extraDiv.innerHTML = `<strong>📈 预测不可用</strong> 数据不足`;
        }
        setInterval(updateLinearForecast, 2000);
        updateLinearForecast();
      }
    }

    // 绑定事件与初始化增强
    const realtimeToggle = document.getElementById('realtimeToggle');
    if(realtimeToggle) {
      realtimeToggle.addEventListener('change', (e) => { realtimeEnabled = e.target.checked; if(realtimeEnabled) startRealtime(); else stopRealtime(); });
    }
    const threshBtn = document.getElementById('thresholdConfigBtn');
    if(threshBtn) threshBtn.addEventListener('click', configThreshold);

    setInterval(() => { if(currentDashboardData) applyThresholdsToAlerts(); }, 1500);
    enhanceReviewForecast();
    setTimeout(() => { if(trendChart) addForecastLineToChart(); }, 500);
  }, 100);
})();
</script>
